name: BR2026
options:
  bundleIdPrefix: com.vibrito
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SWIFT_VERSION: "6.0"
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: R4L6C6JGYH
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
targets:
  BR2026:
    type: application
    platform: iOS
    sources:
      - BR2026
    info:
      path: Generated/BR2026-Info.plist
      properties:
        API_KEY: $(API_KEY)
        UILaunchScreen: {}
        CFBundleDisplayName: "BR 2026"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibrito.br2026
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postBuildScripts:
      - name: "Set build number from git commit count"
        basedOnDependencyAnalysis: false
        script: |
          # Archives need a CFBundleVersion that actually changes between
          # uploads (App Store Connect rejects a repeat), and the
          # xcodegen-generated Info.plist is rewritten from a static value
          # on every `xcodegen generate`, so nothing here persists on its
          # own — derive it from git history instead, every archive.
          if [ "$ACTION" = "install" ]; then
            buildNumber=$(git -C "${SRCROOT}" rev-list --count HEAD)
            plist="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $buildNumber" "$plist"
          fi
  BR2026Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BR2026Tests
    dependencies:
      - target: BR2026
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  BR2026:
    build:
      targets:
        BR2026: all
        BR2026Tests: [test]
    test:
      targets:
        - BR2026Tests
